server {
    listen 80;
    server_name www.eatspay.co.kr eatspay.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://www.eatspay.co.kr$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.eatspay.co.kr eatspay.co.kr;

    ssl_certificate     /etc/letsencrypt/live/www.eatspay.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.eatspay.co.kr/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
